<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>通話中...</title>
    <!-- 根據設定載入對應的 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/' + os_style + '.css') }}">
</head>
<body class="{{ os_style }}-style">
    <div class="call-screen">
        <div class="caller-info">
            <h1 class="caller-name">{{ scenario.caller_name }}</h1>
            <p class="call-status" id="timer">00:00</p>
        </div>

        <div class="keypad-grid">
            <div class="grid-btn" id="btn-mute" onclick="toggleMute()">
                <div class="icon-circle" id="icon-mute">🎙️</div>
                <span class="label" id="label-mute">靜音</span>
            </div>
            <div class="grid-btn" onclick="alert('模擬來電期間無法使用鍵盤')">
                <div class="icon-circle">🔢</div>
                <span class="label">鍵盤</span>
            </div>
            <div class="grid-btn" id="btn-speaker" onclick="toggleSpeaker()">
                <div class="icon-circle" id="icon-speaker">🔊</div>
                <span class="label" id="label-speaker">擴音</span>
            </div>
            <div class="grid-btn" onclick="alert('模擬來電期間無法新增通話')">
                <div class="icon-circle">➕</div>
                <span class="label">新增通話</span>
            </div>
            <div class="grid-btn" onclick="alert('模擬來電期間無法使用 FaceTime')">
                <div class="icon-circle">💬</div>
                <span class="label">FaceTime</span>
            </div>
            <div class="grid-btn" onclick="alert('模擬來電期間無法查看聯絡人')">
                <div class="icon-circle">👤</div>
                <span class="label">聯絡人</span>
            </div>
        </div>

        <div class="active-actions">
            <div class="action-btn-wrapper">
                <a href="javascript:void(0)" onclick="endActiveCall()" class="action-btn btn-end" style="text-decoration:none;">
                    <span style="transform: rotate(135deg);">📞</span>
                </a>
            </div>
        </div>
    </div>

    <!-- 判斷要播放的 TTS 語音腳本 -->
    {% set tts_voice = 'voice_family' %}
    {% if 'boss' in scenario.audio_file %}
        {% set tts_voice = 'voice_boss' %}
    {% elif 'delivery' in scenario.audio_file %}
        {% set tts_voice = 'voice_friend' %}
    {% endif %}

    <!-- 隱藏資料供 JS 使用 -->
    <input type="hidden" id="caller-voice" value="{{ tts_voice }}">
    <input type="hidden" id="setup-url" value="{{ url_for('scenario.index') }}">

    <script src="{{ url_for('static', filename='js/call-audio.js') }}"></script>
    <script src="{{ url_for('static', filename='js/call-timer.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            startActiveCall();
        });
    </script>
</body>
</html>
