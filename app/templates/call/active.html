<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>通話中...</title>
    <!-- 根據設定載入對應的 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/' + os_style + '.css') }}">
</head>
<body class="{{ os_style }}-style">
    <div class="call-screen">
        <div class="caller-info">
            <h1 class="caller-name">{{ scenario.caller_name }}</h1>
            <p class="call-status" id="timer">00:00</p>
        </div>

        <div class="keypad-grid">
            <button class="grid-btn" id="btn-mute" type="button">
                <div class="icon-circle">🎙️</div>
                <span class="label">靜音</span>
            </button>
            <button class="grid-btn" id="btn-keypad" type="button">
                <div class="icon-circle">🔢</div>
                <span class="label">鍵盤</span>
            </button>
            <button class="grid-btn" id="btn-speaker" type="button">
                <div class="icon-circle">🔊</div>
                <span class="label">擴音</span>
            </button>
            <button class="grid-btn" id="btn-add-call" type="button">
                <div class="icon-circle">➕</div>
                <span class="label">新增通話</span>
            </button>
            <button class="grid-btn" id="btn-facetime" type="button">
                <div class="icon-circle">💬</div>
                <span class="label">FaceTime</span>
            </button>
            <button class="grid-btn" id="btn-contacts" type="button">
                <div class="icon-circle">👤</div>
                <span class="label">聯絡人</span>
            </button>
        </div>

        <!-- 數字鍵盤蓋層 (初始隱藏) -->
        <div id="keypad-overlay" class="keypad-overlay" style="display: none;">
            <div class="overlay-header">
                <span id="keypad-display" class="keypad-display"></span>
            </div>
            <div class="numeric-grid">
                <button class="num-btn" data-val="1">1</button>
                <button class="num-btn" data-val="2">2<span>ABC</span></button>
                <button class="num-btn" data-val="3">3<span>DEF</span></button>
                <button class="num-btn" data-val="4">4<span>GHI</span></button>
                <button class="num-btn" data-val="5">5<span>JKL</span></button>
                <button class="num-btn" data-val="6">6<span>MNO</span></button>
                <button class="num-btn" data-val="7">7<span>PQRS</span></button>
                <button class="num-btn" data-val="8">8<span>TUV</span></button>
                <button class="num-btn" data-val="9">9<span>WXYZ</span></button>
                <button class="num-btn" data-val="*">*</button>
                <button class="num-btn" data-val="0">0<span>+</span></button>
                <button class="num-btn" data-val="#">#</button>
            </div>
            <button id="btn-hide-keypad" class="btn-hide-keypad">隱藏</button>
        </div>

        <div class="active-actions">
            <div class="action-btn-wrapper">
                <a href="{{ url_for('main.index') }}" class="action-btn btn-end" style="text-decoration:none;">
                    <span style="transform: rotate(135deg);">📞</span>
                </a>
            </div>
        </div>
    </div>

    <!-- 隱藏的語音播放器 -->
    <audio id="scenario-audio" src="{{ url_for('static', filename='audio/' + scenario.audio_file) }}" autoplay></audio>

    <script src="{{ url_for('static', filename='js/call.js') }}"></script>
</body>
</html>
