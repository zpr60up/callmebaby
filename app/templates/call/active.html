<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>通話中...</title>
    <!-- 加入共通的 CSS 樣式 (數字鍵盤等) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/call-common.css') }}?v=2">
    <!-- 根據設定載入對應的作業系統 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/' + os_style + '.css') }}?v=2">
</head>
<body class="{{ os_style }}-style">
    <div class="call-screen">
        <div class="caller-info">
            <h1 class="caller-name">{{ scenario.caller_name }}</h1>
            <p class="call-status" id="call-timer">00:00</p>
        </div>

        <div class="keypad-grid">
            <div class="grid-btn" id="btn-mute" onclick="toggleMute()">
                <div class="icon-circle" id="icon-mute">🎙️</div>
                <span class="label" id="label-mute">靜音</span>
            </div>
            <div class="grid-btn" id="btn-keypad" onclick="toggleKeypad()">
                <div class="icon-circle">🔢</div>
                <span class="label">鍵盤</span>
            </div>
            <div class="grid-btn" id="btn-speaker" onclick="toggleSpeaker()">
                <div class="icon-circle" id="icon-speaker">🔊</div>
                <span class="label" id="label-speaker">擴音</span>
            </div>
            <div class="grid-btn">
                <div class="icon-circle">➕</div>
                <span class="label">新增通話</span>
            </div>
            <div class="grid-btn">
                <div class="icon-circle">💬</div>
                <span class="label">FaceTime</span>
            </div>
            <div class="grid-btn">
                <div class="icon-circle">👤</div>
                <span class="label">聯絡人</span>
            </div>
        </div>

        <div class="active-actions">
            <div class="action-btn-wrapper">
                <a href="javascript:void(0)" onclick="endActiveCall()" class="action-btn btn-end" style="text-decoration:none;">
                    <span style="transform: rotate(135deg);">📞</span>
                </a>
            </div>
        </div>
    </div>

    <!-- 數字鍵盤 overlay -->
    <div class="keypad-overlay" id="keypad-overlay" style="display:none;">
        <div class="keypad-header">
            <span class="keypad-number" id="keypad-display"></span>
            <button class="keypad-close" onclick="toggleKeypad()">
                <span class="material-icons-round">⌨️</span>
            </button>
        </div>
        <div class="keypad-grid">
            <button class="keypad-key" onclick="pressKey('1')"><span class="key-num">1</span><span class="key-sub"></span></button>
            <button class="keypad-key" onclick="pressKey('2')"><span class="key-num">2</span><span class="key-sub">ABC</span></button>
            <button class="keypad-key" onclick="pressKey('3')"><span class="key-num">3</span><span class="key-sub">DEF</span></button>
            <button class="keypad-key" onclick="pressKey('4')"><span class="key-num">4</span><span class="key-sub">GHI</span></button>
            <button class="keypad-key" onclick="pressKey('5')"><span class="key-num">5</span><span class="key-sub">JKL</span></button>
            <button class="keypad-key" onclick="pressKey('6')"><span class="key-num">6</span><span class="key-sub">MNO</span></button>
            <button class="keypad-key" onclick="pressKey('7')"><span class="key-num">7</span><span class="key-sub">PQRS</span></button>
            <button class="keypad-key" onclick="pressKey('8')"><span class="key-num">8</span><span class="key-sub">TUV</span></button>
            <button class="keypad-key" onclick="pressKey('9')"><span class="key-num">9</span><span class="key-sub">WXYZ</span></button>
            <button class="keypad-key" onclick="pressKey('*')"><span class="key-num">＊</span><span class="key-sub"></span></button>
            <button class="keypad-key" onclick="pressKey('0')"><span class="key-num">0</span><span class="key-sub">+</span></button>
            <button class="keypad-key" onclick="pressKey('#')"><span class="key-num">＃</span><span class="key-sub"></span></button>
        </div>
    </div>

    <!-- 判斷要播放的 TTS 語音腳本 -->
    {% set tts_voice = 'voice_family' %}
    {% if 'boss' in scenario.audio_file %}
        {% set tts_voice = 'voice_boss' %}
    {% elif 'delivery' in scenario.audio_file %}
        {% set tts_voice = 'voice_delivery' %}
    {% endif %}

    <!-- 隱藏資料供 JS 使用 -->
    <input type="hidden" id="caller-voice" value="{{ tts_voice }}">
    <input type="hidden" id="setup-url" value="{{ url_for('scenario.index') }}">

    <script src="{{ url_for('static', filename='js/call-audio.js') }}?v=5"></script>
    <script src="{{ url_for('static', filename='js/call-incoming.js') }}?v=5"></script>
    <script src="{{ url_for('static', filename='js/call-timer.js') }}?v=5"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            startActiveCall();
        });
    </script>
</body>
</html>
